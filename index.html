<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquitex - Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body {
    font-family: 'Sora', sans-serif;
    font-weight: 400;
    background-color: #000000;
    color: #FFFFFF;
    min-height: 100vh;
    line-height: 1.6;
    font-size: 15px;
  }

  :root {
    --bg: #000000;
    --text: #FFFFFF;
    --text-muted: #999999;
    --text-dim: #666666;
    --accent: #FEAE02;
    --accent-hover: #E59D02;
    --accent-subtle: rgba(254, 174, 2, 0.08);
    --accent-border: rgba(254, 174, 2, 0.2);
    --surface: #0A0A0A;
    --surface-2: #111111;
    --surface-3: #1A1A1A;
    --border: #222222;
    --radius-btn: 10px;
    --radius-card: 12px;
    --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  .page-wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-sub {
    display: block;
    font-size: 11px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .menu-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: -0.3px;
  }

  .menu-options {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 400px;
  }

  .menu-card {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 24px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    text-decoration: none;
    color: var(--text);
    transition: all var(--transition);
    cursor: pointer;
  }

  .menu-card:hover {
    border-color: var(--accent);
    background: var(--surface-3);
  }

  .menu-card:active {
    transform: scale(0.98);
  }

  .menu-card-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent-subtle);
    border: 1px solid var(--accent-border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .menu-card-icon svg {
    width: 22px;
    height: 22px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .menu-card-content {
    flex: 1;
  }

  .menu-card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .menu-card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .menu-card-arrow {
    flex-shrink: 0;
    opacity: 0.3;
    transition: opacity var(--transition), transform var(--transition);
  }

  .menu-card:hover .menu-card-arrow {
    opacity: 0.7;
    transform: translateX(2px);
  }

  .menu-card-arrow svg {
    width: 18px;
    height: 18px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .footer {
    text-align: center;
    padding: 40px 0 20px;
    margin-top: auto;
  }

  .footer a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 11px;
    font-weight: 400;
    transition: color var(--transition);
  }

  .footer a:hover {
    color: var(--text-muted);
  }

  @media (max-width: 480px) {
    .page-wrapper {
      padding: 16px 16px 40px;
    }

    .logo {
      font-size: 24px;
    }

    .menu-title {
      font-size: 20px;
    }

    .menu-card {
      padding: 20px;
    }
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <header class="header">
    <div class="logo">
      Arquitex
      <span class="logo-sub">by coinbox</span>
    </div>
  </header>

  <h2 class="menu-title">¿Qué querés hacer?</h2>

  <div class="menu-options">

    <a href="/onboarding" class="menu-card">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="menu-card-content">
        <div class="menu-card-title">Onboarding</div>
        <div class="menu-card-desc">Iniciar el proceso de alta de una nueva empresa.</div>
      </div>
      <div class="menu-card-arrow">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>

    <a href="/ficha-cierre" class="menu-card">
      <div class="menu-card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div class="menu-card-content">
        <div class="menu-card-title">Ficha de Cierre</div>
        <div class="menu-card-desc">Registrar un cierre pactado con un cliente.</div>
      </div>
      <div class="menu-card-arrow">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>

  </div>

  <footer class="footer">
  </footer>

</div>

</body>
</html>
